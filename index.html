.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}

.tab.active{background:#3B82F6;color:#FFF}

.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid #1E293B}
table{width:100%;border-collapse:collapse;font-size:12px}

th{background:#151922;color:#94A3B8;font-weight:600;padding:10px 14px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:2px solid #1E293B;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
th:hover{color:#CBD5E1}
th .arrow{font-size:9px;margin-left:3px;opacity:.3}
th.sorted .arrow{opacity:1;color:#3B82F6}
td{padding:9px 14px;border-bottom:1px solid #1E293B;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:12px}
tr:hover td{background:#1a1f2e}
td.name-cell{font-family:'DM Sans',sans-serif;font-weight:500;position:sticky;left:36px;background:#0C0F14;z-index:5;min-width:340px;max-width:440px;overflow:hidden;text-overflow:ellipsis}
tr:hover td.name-cell{background:#1a1f2e}
td.idx-cell{text-align:center;color:#475569;position:sticky;left:0;background:#0C0F14;z-index:5;min-width:36px;font-family:'JetBrains Mono',monospace}

th.idx-th{position:sticky;left:0;z-index:11;min-width:36px;text-align:center}
th.name-th{position:sticky;left:36px;z-index:11;min-width:340px}
td.r{text-align:right}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif}

const KPI = {
  cac: {green:1800, yellow:2500},
  cpl: {green:100, yellow:120},
  cpMql: {green:120, yellow:160},
  cpContact: {green:200, yellow:300},
  cpSql: {green:500, yellow:800},
  hookRate: {green:40, yellow:25},
  holdRate: {green:50, yellow:35},
};

function ccBadge(v, metric) {
  if (v == null || v === 0) return 'nd';
  const k = KPI[metric];
  if (!k) return 'nd';
  if (metric === 'hookRate' || metric === 'holdRate') {
    return v >= k.green ? 'wk' : v >= k.yellow ? 'of' : 'ak';
  }
  return v <= k.green ? 'wk' : v <= k.yellow ? 'of' : 'ak';
}

function statusBadge(s) {
  if (!s) return '';
  const sl = s.toLowerCase();
  if (sl.includes('past winner')) return '<span class="badge status-paused">Past Winner</span>';
  if (sl.includes('winner')) return '<span class="badge status-winner">Winner</span>';
  if (sl === 'loser') return '<span class="badge status-loser">Loser</span>';
  if (sl === 'testing') return '<span class="badge status-testing">Testing</span>';
  if (sl === 'on the fence') return '<span class="badge status-otf">On the Fence</span>';
  return '<span class="badge status-testing">' + s + '</span>';
}

function fmt(v, type) {
  if (v == null) return '<span class="nd">—</span>';
  if (type === '$') return '$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (type === '$0') return '$' + v.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
  if (type === '%') return v.toFixed(1) + '%';
  if (type === '%2') return v.toFixed(2) + '%';
  if (type === 'n') return v.toLocaleString('en-US', {maximumFractionDigits:0});
  if (type === 'x') return v.toFixed(2) + 'x';
  return String(v);
}

function bw(v, metric, type) {
  if (v == null || v === 0) return '<span class="nd">—</span>';
  return '<span class="badge ' + ccBadge(v, metric) + '">' + fmt(v, type) + '</span>';
}

const TABS = {
  staticAds: {isVideo:false, isConcept:false},
  staticConcepts: {isVideo:false, isConcept:true},
  videoAds: {isVideo:true, isConcept:false},
  videoConcepts: {isVideo:true, isConcept:true},
};

let currentTab = 'staticAds';
let sortCol = 'cost';
let sortDir = -1;
let filterWinners = false;
let filterMinSpend = false;

function columns(tab) {
  const t = TABS[tab];
  let cols = [
    {key:'idx',label:'#',sort:false},
    {key:'name',label:'Name',sort:true},
    {key:'link',label:'Ad',sort:false},
  ];
  if (t.isConcept) cols.push({key:'numAds',label:'# Ads',sort:true});
  else cols.push({key:'status',label:'Status',sort:true});

  cols.push(
    {key:'cost',label:'Spend',sort:true,fmt:'$'},
    {key:'leads',label:'Leads',sort:true,fmt:'n'},
    {key:'cpl',label:'CPL',sort:true,kpi:'cpl',fmt:'$0'},
    {key:'mql',label:'MQL',sort:true,fmt:'n'},
    {key:'cpMql',label:'$/MQL',sort:true,kpi:'cpMql',fmt:'$0'},
    {key:'contacts',label:'Contacts',sort:true,fmt:'n'},
    {key:'cpContact',label:'$/Contact',sort:true,kpi:'cpContact',fmt:'$0'},
    {key:'sqls',label:'SQLs',sort:true,fmt:'n'},
    {key:'cpSql',label:'$/SQL',sort:true,kpi:'cpSql',fmt:'$0'},
    {key:'clients',label:'Clients',sort:true,fmt:'n'},
    {key:'cac',label:'CAC',sort:true,kpi:'cac',fmt:'$0'},
  );

  if (t.isVideo) {
    cols.push(
      {key:'hookRate',label:'Hook %',sort:true,kpi:'hookRate',fmt:'%'},
      {key:'holdRate',label:'Hold %',sort:true,kpi:'holdRate',fmt:'%'},
    );
  }

  cols.push(
    {key:'ctrAll',label:'CTR (all)',sort:true,fmt:'%2'},
    {key:'ctrLink',label:'CTR (link)',sort:true,fmt:'%2'},
    {key:'cpm',label:'CPM',sort:true,fmt:'$0'},
    {key:'impressions',label:'Impr',sort:true,fmt:'n'},
  );

  return cols;
}

function render() {
  const tab = currentTab;
  const t = TABS[tab];
  const cols = columns(tab);
  let rows = [...DATA[tab]];
  const q = document.getElementById('search').value.toLowerCase();
  if (q) rows = rows.filter(r => r.name.toLowerCase().includes(q));
  if (filterWinners) rows = rows.filter(r => (r.status||'').toLowerCase().includes('winner'));
  if (filterMinSpend) rows = rows.filter(r => (r.cost||0) >= 200);

  rows.sort((a,b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });

  let th = '<tr>';
  for (const c of cols) {
    let cls = '';
    if (c.key === 'idx') cls = ' class="idx-th"';
    else if (c.key === 'name') cls = ' class="name-th"';
    const sorted = sortCol === c.key ? ' sorted' : '';
    const arrow = c.sort ? (sortCol === c.key ? (sortDir > 0 ? ' ▲' : ' ▼') : ' ▲') : '';
    if (c.sort) {
      th += '<th' + cls + ' class="' + sorted + '" data-col="' + c.key + '">' + c.label + '<span class="arrow">' + arrow + '</span></th>';
    } else {
      th += '<th' + cls + '>' + c.label + '</th>';
    }
  }
  th += '</tr>';
  document.getElementById('thead').innerHTML = th;

  let tb = '';
  rows.forEach((r, i) => {
    tb += '<tr>';
    for (const c of cols) {
      if (c.key === 'idx') {
        tb += '<td class="idx-cell">' + (i+1) + '</td>';
      } else if (c.key === 'name') {
        tb += '<td class="name-cell" title="' + r.name.replace(/"/g,'&quot;') + '">' + r.name + '</td>';
      } else if (c.key === 'link') {
        if (r.link) {
          tb += '<td><a class="view-link" href="' + r.link + '" target="_blank" rel="noopener">View <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4.5 1.5H2a.5.5 0 00-.5.5v8a.5.5 0 00.5.5h8a.5.5 0 00.5-.5V7.5M7 1.5h3.5V5M6 6l4.5-4.5"/></svg></a></td>';
        } else {
          tb += '<td><span class="no-link">—</span></td>';
        }
      } else if (c.key === 'status') {
        tb += '<td>' + statusBadge(r.status) + '</td>';
      } else if (c.key === 'numAds') {
        tb += '<td class="r">' + (r.numAds || '—') + '</td>';
      } else if (c.kpi) {
        tb += '<td class="r">' + bw(r[c.key], c.kpi, c.fmt) + '</td>';
      } else {
        tb += '<td class="r">' + fmt(r[c.key], c.fmt || 'n') + '</td>';
      }
    }
    tb += '</tr>';
  });
  document.getElementById('tbody').innerHTML = tb;
  document.getElementById('rowCount').textContent = rows.length + ' of ' + DATA[tab].length + ' creatives';

  // Legend
  let legend = '<span class="legend-item"><span class="legend-dot" style="background:#34D399"></span> CAC \u2264 $1,800 | CPL \u2264 $100</span>';
  legend += '<span class="legend-item"><span class="legend-dot" style="background:#FBBF24"></span> CAC $1,800\u2013$2,500 | CPL $100\u2013$120</span>';
  legend += '<span class="legend-item"><span class="legend-dot" style="background:#F87171"></span> CAC > $2,500 | CPL > $120</span>';
  legend += '<span class="legend-item"><span class="legend-dot" style="background:#475569"></span> No Data</span>';
  if (t.isVideo) {
    legend += '<span class="legend-item" style="margin-left:12px"><span class="legend-dot" style="background:#34D399"></span> Hook \u2265 40% | Hold \u2265 50%</span>';
    legend += '<span class="legend-item"><span class="legend-dot" style="background:#FBBF24"></span> Hook 25\u201340% | Hold 35\u201350%</span>';
  }
  document.getElementById('legend').innerHTML = legend;
}

document.getElementById('tabs').addEventListener('click', e => {
  const t = e.target.closest('.tab');
  if (!t) return;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  t.classList.add('active');
  currentTab = t.dataset.tab;
  sortCol = 'cost'; sortDir = -1;
  render();
});

document.getElementById('thead').addEventListener('click', e => {
  const th = e.target.closest('th[data-col]');
  if (!th) return;
  const col = th.dataset.col;
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  render();
});

document.getElementById('search').addEventListener('input', render);
document.getElementById('btnWinners').addEventListener('click', function() {
  filterWinners = !filterWinners;
  this.classList.toggle('active', filterWinners);
  render();
});
document.getElementById('btnMinSpend').addEventListener('click', function() {
  filterMinSpend = !filterMinSpend;
  this.classList.toggle('active', filterMinSpend);
  render();
});

render();
</script>
</body>
</html>
