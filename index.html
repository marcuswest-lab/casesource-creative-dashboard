<title>Case Source Creative Performance Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0C0F14;color:#E2E8F0;font-family:'DM Sans',sans-serif;padding:24px 24px 48px}
.container{max-width:1700px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
h1{font-size:28px;font-weight:700;color:#F8FAFC;margin-bottom:6px}
.subtitle{color:#94A3B8;font-size:14px;margin-bottom:16px}
.legend{text-align:center;margin-bottom:20px;font-size:12px;color:#94A3B8;display:flex;justify-content:center;gap:24px;flex-wrap:wrap;align-items:center}
.legend-item{display:inline-flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search{background:#151922;border:1px solid #334155;color:#E2E8F0;padding:8px 14px;border-radius:8px;font-size:13px;width:280px;font-family:'DM Sans',sans-serif}
.search::placeholder{color:#64748B}
.filter-btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #334155;background:#1E293B;color:#94A3B8;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:#334155;color:#E2E8F0;border-color:#475569}
.tabs-bar{display:flex;gap:0;margin-bottom:16px;background:#151922;border-radius:10px;border:1px solid #1E293B;overflow:hidden;width:fit-content}
.tab{padding:10px 22px;cursor:pointer;font-size:13px;font-weight:600;color:#64748B;border-right:1px solid #1E293B;transition:all .2s;white-space:nowrap}
.tab:last-child{border-right:none}
.tab:hover{color:#CBD5E1;background:#1E293B}
.tab.active{background:#3B82F6;color:#FFF}
.tab .cnt{font-weight:400;opacity:.7;margin-left:3px}
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:80vh;border-radius:10px;border:1px solid #1E293B}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:10}
th{background:#151922;color:#94A3B8;font-weight:600;padding:10px 14px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:2px solid #1E293B;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
th:hover{color:#CBD5E1}
th .arrow{font-size:9px;margin-left:3px;opacity:.3}
th.sorted .arrow{opacity:1;color:#3B82F6}
td{padding:9px 14px;border-bottom:1px solid #1E293B;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:12px}
tr:hover td{background:#1a1f2e}
td.name-cell{font-family:'DM Sans',sans-serif;font-weight:500;position:sticky;left:36px;background:#0C0F14;z-index:5;min-width:340px;max-width:440px;overflow:hidden;text-overflow:ellipsis}
tr:hover td.name-cell{background:#1a1f2e}
td.idx-cell{text-align:center;color:#475569;position:sticky;left:0;background:#0C0F14;z-index:5;min-width:36px;font-family:'JetBrains Mono',monospace}
tr:hover td.idx-cell{background:#1a1f2e}
th.idx-th{position:sticky;left:0;z-index:11;min-width:36px;text-align:center}
th.name-th{position:sticky;left:36px;z-index:11;min-width:340px}
td.r{text-align:right}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif}
.wk{background:rgba(52,211,153,.15);color:#34D399}
.of{background:rgba(251,191,36,.15);color:#FBBF24}
.ak{background:rgba(248,113,113,.15);color:#F87171}
.nd{color:#475569}
.view-link{color:#60A5FA;text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:500;font-size:11px;display:inline-flex;align-items:center;gap:3px}
.view-link:hover{color:#93C5FD;text-decoration:underline}
.view-link svg{width:11px;height:11px}
.brief-link{color:#A78BFA;text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:500;font-size:11px;display:inline-flex;align-items:center;gap:3px}
.brief-link:hover{color:#C4B5FD;text-decoration:underline}
.no-link{color:#334155}
.row-count{color:#475569;font-size:12px;margin-top:8px;text-align:right}
</style>
</head>

const KPI = {
  cac: {green:1800, yellow:2500},
  cpl: {green:100, yellow:120},
  cpMql: {green:250, yellow:275},
  cpContact: {green:200, yellow:300},
  cpSql: {green:500, yellow:800},
  hookRate: {green:40, yellow:25},
  holdRate: {green:50, yellow:35},
};

function ccBadge(v, metric) {
  if (v == null || v === 0) return 'nd';
  const k = KPI[metric];
  if (!k) return 'nd';
  if (metric === 'hookRate' || metric === 'holdRate') {
    return v >= k.green ? 'wk' : v >= k.yellow ? 'of' : 'ak';
  }
  return v <= k.green ? 'wk' : v <= k.yellow ? 'of' : 'ak';
}

function fmt(v, type) {
  if (v == null) return '<span class="nd">\u2014</span>';
  if (type === '$') return '$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (type === '$0') return '$' + v.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
  if (type === '%') return v.toFixed(1) + '%';
  if (type === '%2') return v.toFixed(2) + '%';
  if (type === 'n') return v.toLocaleString('en-US', {maximumFractionDigits:0});
  return String(v);
}

function bw(v, metric, type) {
  if (v == null || v === 0) return '<span class="nd">\u2014</span>';
  return '<span class="badge ' + ccBadge(v, metric) + '">' + fmt(v, type) + '</span>';

const isVideo = t => t === 'videoAds' || t === 'videoConcepts';
const isConcept = t => t.includes('Concept');

let curTab = 'staticAds', sortCol = 'cost', sortAsc = false;
let filterWinners = false, filterMinSpend = false;

const COLS_BASE = [
  {key:'cost',label:'Spend',fmt:'$'},
  {key:'leads',label:'Leads',fmt:'n'},
  {key:'cpl',label:'CPL',fmt:'$0',kpi:'cpl'},
  {key:'mql',label:'MQL',fmt:'n'},
  {key:'cpMql',label:'$/MQL',fmt:'$0',kpi:'cpMql'},
  {key:'contacts',label:'Contacts',fmt:'n'},
  {key:'cpContact',label:'$/Contact',fmt:'$0',kpi:'cpContact'},
  {key:'sqls',label:'SQLs',fmt:'n'},
  {key:'cpSql',label:'$/SQL',fmt:'$0',kpi:'cpSql'},
  {key:'clients',label:'Clients',fmt:'n'},
  {key:'cac',label:'CAC',fmt:'$0',kpi:'cac'},
];
const COLS_VIDEO = [
  {key:'hookRate',label:'Hook %',fmt:'%',kpi:'hookRate'},
  {key:'holdRate',label:'Hold %',fmt:'%',kpi:'holdRate'},
];
const COLS_TAIL = [
  {key:'ctrAll',label:'CTR (all)',fmt:'%2'},
  {key:'ctrLink',label:'CTR (link)',fmt:'%2'},
  {key:'cpm',label:'CPM',fmt:'$'},
  {key:'impressions',label:'Impr',fmt:'n'},
];

function getCols(tab) {
  let cols = [...COLS_BASE];
  if (isVideo(tab)) cols = cols.concat(COLS_VIDEO);
  cols = cols.concat(COLS_TAIL);
  return cols;
}

function updateLegend() {
  const el = document.getElementById('legend');
  let h = '<span class="legend-item"><span class="legend-dot" style="background:#34D399"></span>CAC \u2264 $1,800 | CPL \u2264 $100</span>';
  h += '<span class="legend-item"><span class="legend-dot" style="background:#FBBF24"></span>CAC $1,800\u2013$2,500 | CPL $100\u2013$120</span>';
  h += '<span class="legend-item"><span class="legend-dot" style="background:#F87171"></span>CAC > $2,500 | CPL > $120</span>';
  h += '<span class="legend-item"><span class="legend-dot" style="background:#475569"></span>No Data</span>';
  if (isVideo(curTab)) {
    h += '<span class="legend-item"><span class="legend-dot" style="background:#34D399"></span>Hook \u2265 40% | Hold \u2265 50%</span>';
    h += '<span class="legend-item"><span class="legend-dot" style="background:#FBBF24"></span>Hook 25\u201340% | Hold 35\u201350%</span>';
    h += '<span class="legend-item"><span class="legend-dot" style="background:#F87171"></span>Hook < 25% | Hold < 35%</span>';
  }
  el.innerHTML = h;
}

function render() {
  let rows = DATA[curTab] ? [...DATA[curTab]] : [];
  const q = document.getElementById('search').value.toLowerCase();
  if (q) rows = rows.filter(r => r.name.toLowerCase().includes(q));
  if (filterWinners) rows = rows.filter(r => r.cac != null && r.cac > 0 && r.cac <= 1800);
  if (filterMinSpend) rows = rows.filter(r => r.cost >= 1500);

  rows.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    return sortAsc ? av - bv : bv - av;
  });

  const cols = getCols(curTab);
  const concept = isConcept(curTab);

  let th = '<tr><th class="idx-th">#</th><th class="name-th" data-sort="name">Name <span class="arrow">\u25B2</span></th>';
  th += '<th>Ad</th>';
  th += '<th>Brief</th>';
  if (concept) th += '<th data-sort="variations"># Ads <span class="arrow">\u25B2</span></th>';
  for (const c of cols) {
    const cls = sortCol === c.key ? ' class="sorted"' : '';
    th += '<th' + cls + ' data-sort="' + c.key + '">' + c.label + ' <span class="arrow">' + (sortCol === c.key ? (sortAsc ? '\u25B2' : '\u25BC') : '\u25B2') + '</span></th>';
  }
  th += '</tr>';
  document.getElementById('thead').innerHTML = th;

  let tb = '';
  rows.forEach((r, i) => {
    tb += '<tr><td class="idx-cell">' + (i + 1) + '</td>';
    tb += '<td class="name-cell" title="' + r.name.replace(/"/g, '&quot;') + '">' + r.name + '</td>';
    tb += '<td>' + viewLink(r.link) + '</td>';
    tb += '<td>' + briefLink(r.brief) + '</td>';
    if (concept) tb += '<td class="r">' + (r.variations || 1) + '</td>';
    for (const c of cols) {
      const v = r[c.key];
      if (c.kpi) {
        tb += '<td class="r">' + bw(v, c.kpi, c.fmt) + '</td>';
      } else {
        tb += '<td class="r">' + fmt(v, c.fmt) + '</td>';
      }
    }
    tb += '</tr>';
  });
  document.getElementById('tbody').innerHTML = tb;
  document.getElementById('rowCount').textContent = rows.length + ' of ' + DATA[curTab].length + ' creatives';
  updateLegend();

  document.querySelectorAll('#thead th[data-sort]').forEach(th => {
    th.onclick = () => {
      const col = th.dataset.sort;
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = col === 'name'; }
      render();
    };
  });
}

document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    curTab = t.dataset.tab;
    sortCol = 'cost'; sortAsc = false;
    render();
  };
});

document.getElementById('search').oninput = () => render();
document.getElementById('btnWinners').onclick = function() {
  filterWinners = !filterWinners;
  this.classList.toggle('active');
  render();
};
document.getElementById('btnMinSpend').onclick = function() {
  filterMinSpend = !filterMinSpend;
  this.classList.toggle('active');
  render();
};

render();
</script>

<script>
/* Add an "Awareness / Lead Type" tab to the dashboard's existing tab bar that
   opens the overlay above.  Renderer-agnostic: clones a sibling tab so styling
   matches, neutralises the original tab behaviour, and re-adds itself if the
   renderer rebuilds the bar. */
(function(){
 function bar(){return document.getElementById('tabBar')||document.querySelector('.tab-bar')
   ||document.querySelector('.tabbar')||document.querySelector('.tabs-bar')||document.querySelector('.tabs')
   ||document.getElementById('tabs')||document.querySelector('[role=tablist]');}
 function add(){
   var b=bar();if(!b)return false;
   if(document.getElementById('awx-tab'))return true;
   var s=b.querySelector('button,a,[data-tab],.tab');
   var t;
   if(s){t=s.cloneNode(true);t.removeAttribute('onclick');t.removeAttribute('href');
     t.setAttribute('data-tab','__awx__');}
   else{t=document.createElement('button');}
   t.id='awx-tab';t.classList.add('awx-tab');
   ['active','on','sel','current','sorted','selected'].forEach(function(c){t.classList.remove(c);});
   t.textContent='▦ Awareness / Lead Type';
   t.addEventListener('click',function(e){e.preventDefault();e.stopImmediatePropagation();
     if(window.awxOpen)awxOpen();},true);
   b.appendChild(t);return true;
 }
 var n=0,iv=setInterval(function(){n++;if(add()||n>60)clearInterval(iv);},120);
 if(window.MutationObserver){
   var mo=new MutationObserver(function(){if(!document.getElementById('awx-tab'))add();});
   document.addEventListener('DOMContentLoaded',function(){var b=bar();
     if(b&&b.parentNode)mo.observe(b.parentNode,{childList:true,subtree:true});});
 }
 document.addEventListener('DOMContentLoaded',add);
})();
</script>
